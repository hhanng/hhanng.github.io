<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Error Debugger</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --muted: #888;
    --red: #ff6b6b;
    --amber: #ffa94d;
    --green: #00dc82;
    --blue: #4da6d9;
    --surface: #111;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .container { max-width: 820px; margin: 0 auto; }

  /* Header */
  header { margin-bottom: 32px; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .bug-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #ff6b6b33, #ff6b6b22);
    border: 1px solid #ff6b6b44;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
  header p { font-size: 0.875rem; color: var(--muted); margin-left: 52px; margin-top: -2px; }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 16px;
  }
  .card-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* API Key */
  .api-row { display: flex; gap: 8px; align-items: center; }
  .api-row input { flex: 1; }

  /* Inputs */
  input, select, textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    font-family: inherit;
    width: 100%;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #ff6b6b88;
    box-shadow: 0 0 0 3px rgba(255,107,107,0.1);
  }
  select option { background: var(--card); }

  textarea.error-input {
    min-height: 140px;
    resize: vertical;
    font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 0.83rem;
    line-height: 1.6;
    color: #ff9999;
  }
  textarea.context-input { min-height: 58px; resize: none; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 0.8rem; color: var(--muted); font-weight: 500; }

  /* Button */
  .btn-debug {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    padding: 13px 24px;
    cursor: pointer;
    width: 100%;
    transition: background 0.18s, transform 0.1s;
    font-family: inherit;
    letter-spacing: 0.02em;
  }
  .btn-debug:hover:not(:disabled) { background: #ff5252; }
  .btn-debug:active:not(:disabled) { transform: scale(0.99); }
  .btn-debug:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-sm {
    background: #252525;
    border: 1px solid var(--border);
    color: #ccc;
    border-radius: 7px;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 5px 13px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-sm:hover { background: #2e2e2e; color: #fff; }
  .btn-sm.copied { background: #1a3326; color: var(--green); border-color: #2a5040; }

  .btn-toggle {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    text-decoration: underline;
    white-space: nowrap;
  }

  /* Error banner */
  .error-banner {
    background: #2a1515;
    border: 1px solid #5a2020;
    border-radius: 8px;
    color: #f08080;
    font-size: 0.875rem;
    padding: 11px 14px;
    margin-bottom: 14px;
    display: none;
  }
  .error-banner.show { display: block; }

  /* Loading */
  .loader { display: none; text-align: center; padding: 36px; color: var(--muted); }
  .loader.show { display: block; }
  .spinner {
    width: 38px; height: 38px;
    border: 3px solid #222;
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results { display: none; }
  .results.show { display: block; }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-left-width: 4px;
    padding: 20px 22px;
    margin-bottom: 14px;
    opacity: 0;
    transform: translateY(14px);
    animation: fadeUp 0.35s ease forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .result-card:nth-child(1) { animation-delay: 0.05s; border-left-color: var(--red); }
  .result-card:nth-child(2) { animation-delay: 0.15s; border-left-color: var(--amber); }
  .result-card:nth-child(3) { animation-delay: 0.25s; border-left-color: var(--green); }
  .result-card:nth-child(4) { animation-delay: 0.35s; border-left-color: var(--blue); }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .result-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 0.95rem;
    color: #fff;
  }
  .result-icon {
    font-size: 16px;
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-red { background: rgba(255,107,107,0.15); }
  .icon-amber { background: rgba(255,169,77,0.15); }
  .icon-green { background: rgba(0,220,130,0.15); }
  .icon-blue { background: rgba(77,166,217,0.15); }

  .result-text {
    font-size: 0.875rem;
    line-height: 1.72;
    color: #ccc;
  }

  .steps-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }
  .step-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .step-num {
    width: 22px; height: 22px;
    background: var(--green);
    color: #000;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem;
    font-weight: 800;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-text { font-size: 0.875rem; color: #ccc; line-height: 1.6; }

  .code-block {
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 0.8rem;
    color: #a8e6cf;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.65;
    margin-top: 12px;
  }

  /* History */
  .history-section { margin-top: 28px; }
  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .history-title { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s, background 0.15s;
  }
  .history-item:hover { border-color: #3a3a3a; background: #1e1e1e; }
  .history-snippet {
    font-family: monospace;
    font-size: 0.78rem;
    color: #ff9999;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .history-meta { font-size: 0.72rem; color: #555; white-space: nowrap; }

  @media (max-width: 580px) {
    .row-2 { grid-template-columns: 1fr; }
    header h1 { font-size: 1.2rem; }
    header p { margin-left: 0; margin-top: 4px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-top">
      <div class="bug-icon">🐛</div>
      <h1>API Error Debugger</h1>
    </div>
    <p>Paste any API error — get a plain-English fix with code in seconds.</p>
  </header>

  <!-- API Key -->
  <div class="card">
    <div class="card-label">Gemini API Key</div>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="AIza…" autocomplete="off">
      <button class="btn-toggle" onclick="toggleKey()">Show</button>
    </div>
    <div style="font-size:0.74rem;color:#444;margin-top:7px;">Free at <span style="color:#4da6d9">aistudio.google.com</span> · Stored in localStorage only</div>
  </div>

  <!-- Input Form -->
  <div class="card">
    <div class="form-group" style="margin-bottom:14px;">
      <label for="errorMsg">Error message / API response <span style="color:#555">(paste it raw)</span></label>
      <textarea class="error-input" id="errorMsg" placeholder="e.g.  TypeError: Failed to fetch&#10;  Error: 401 Unauthorized&#10;  SyntaxError: Unexpected token < in JSON at position 0&#10;  AxiosError: Network Error"></textarea>
    </div>

    <div class="row-2" style="margin-bottom:14px;">
      <div class="form-group">
        <label for="lang">Language / Framework</label>
        <select id="lang">
          <option value="JavaScript / Fetch">JavaScript / Fetch</option>
          <option value="Python / requests">Python / requests</option>
          <option value="Python / aiohttp">Python / aiohttp</option>
          <option value="Node.js / axios">Node.js / axios</option>
          <option value="React">React</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="ctx">Context <span style="color:#555">(optional)</span></label>
        <textarea class="context-input" id="ctx" placeholder="What were you trying to do?"></textarea>
      </div>
    </div>
  </div>

  <div class="error-banner" id="errBanner"></div>

  <button class="btn-debug" id="debugBtn" onclick="debug()">🔍 Debug This Error</button>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div>Analysing with Gemini…</div>
  </div>

  <!-- Results -->
  <div class="results" id="results" style="margin-top:22px;">
    <div class="result-card" id="cardWWW">
      <div class="result-header">
        <div class="result-title">
          <div class="result-icon icon-red">😵</div>
          What went wrong
        </div>
      </div>
      <div class="result-text" id="txtWWW"></div>
    </div>

    <div class="result-card" id="cardRC">
      <div class="result-header">
        <div class="result-title">
          <div class="result-icon icon-amber">🔎</div>
          Root cause
        </div>
      </div>
      <div class="result-text" id="txtRC"></div>
    </div>

    <div class="result-card" id="cardFix">
      <div class="result-header">
        <div class="result-title">
          <div class="result-icon icon-green">🛠️</div>
          Fix it
        </div>
        <button class="btn-sm" id="copyFixBtn" onclick="copyFix()">Copy Fix</button>
      </div>
      <ul class="steps-list" id="fixSteps"></ul>
      <div class="code-block" id="fixCode"></div>
    </div>

    <div class="result-card" id="cardPrev">
      <div class="result-header">
        <div class="result-title">
          <div class="result-icon icon-blue">🛡️</div>
          Prevent it
        </div>
      </div>
      <div class="result-text" id="txtPrev"></div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-header">
      <div class="history-title">Recent errors</div>
      <button class="btn-toggle" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script>
const STORAGE_KEY = 'api_debugger_history';
const KEY_STORE   = 'api_debugger_key';
let currentCode = '';

// Persist API key
const savedKey = localStorage.getItem(KEY_STORE);
if (savedKey) document.getElementById('apiKey').value = savedKey;
document.getElementById('apiKey').addEventListener('change', () => {
  localStorage.setItem(KEY_STORE, document.getElementById('apiKey').value.trim());
});

function toggleKey() {
  const inp = document.getElementById('apiKey');
  const btn = event.target;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
}

function showErr(msg) {
  const el = document.getElementById('errBanner');
  el.textContent = msg;
  el.classList.add('show');
}
function hideErr() { document.getElementById('errBanner').classList.remove('show'); }

function setLoading(on) {
  document.getElementById('debugBtn').disabled = on;
  document.getElementById('debugBtn').textContent = on ? 'Analysing…' : '🔍 Debug This Error';
  document.getElementById('loader').classList.toggle('show', on);
  if (on) document.getElementById('results').classList.remove('show');
}

async function debug() {
  hideErr();
  const apiKey = document.getElementById('apiKey').value.trim();
  const errorMsg = document.getElementById('errorMsg').value.trim();
  const lang = document.getElementById('lang').value;
  const ctx = document.getElementById('ctx').value.trim();

  if (!apiKey) { showErr('Please enter your Gemini API key.'); return; }
  if (!errorMsg) { showErr('Please paste an error message.'); return; }

  setLoading(true);

  const prompt = `I am a developer using ${lang}. I got this error:

${errorMsg}

${ctx ? 'Context: ' + ctx : ''}

Respond in this exact JSON format:
{
  "whatWentWrong": "Plain English explanation (2-3 sentences, no jargon)",
  "rootCause": "Technical reason why this happened (2-3 sentences)",
  "fix": {
    "steps": ["Step 1", "Step 2", "Step 3"],
    "code": "// corrected code snippet here"
  },
  "preventIt": "One best practice tip to avoid this error in future"
}

Return only the JSON, no markdown.`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.4, maxOutputTokens: 1500 }
        })
      }
    );

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e?.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const jsonStr = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();
    let parsed;
    try { parsed = JSON.parse(jsonStr); }
    catch { throw new Error('Gemini returned unexpected format. Try again.'); }

    localStorage.setItem(KEY_STORE, apiKey);
    renderResults(parsed, errorMsg, lang);
    saveHistory(errorMsg, lang, parsed);

  } catch (e) {
    showErr('Error: ' + e.message);
  } finally {
    setLoading(false);
  }
}

function renderResults(d, errorMsg, lang) {
  // Force re-animation by re-cloning cards
  ['cardWWW','cardRC','cardFix','cardPrev'].forEach(id => {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = '';
  });

  document.getElementById('txtWWW').textContent = d.whatWentWrong || '';
  document.getElementById('txtRC').textContent  = d.rootCause || '';
  document.getElementById('txtPrev').textContent = d.preventIt || '';

  const steps = d.fix?.steps || [];
  document.getElementById('fixSteps').innerHTML = steps.map((s, i) =>
    `<li class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${esc(s)}</div></li>`
  ).join('');

  currentCode = d.fix?.code || '';
  document.getElementById('fixCode').textContent = currentCode;

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyFix() {
  const text = [
    currentCode,
    '',
    ...((document.getElementById('fixSteps').innerText || '').split('\n').filter(Boolean))
  ].join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyFixBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Fix'; btn.classList.remove('copied'); }, 1800);
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── History ── */
function getHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function saveHistory(errorMsg, lang, parsed) {
  let h = getHistory();
  h.unshift({ errorMsg, lang, parsed, ts: Date.now() });
  h = h.slice(0, 5);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
  renderHistory();
}
function clearHistory() {
  localStorage.removeItem(STORAGE_KEY);
  renderHistory();
}
function renderHistory() {
  const h = getHistory();
  const sec = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (!h.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = h.map((item, i) => {
    const snippet = item.errorMsg.split('\n')[0].slice(0, 80);
    const ago = timeAgo(item.ts);
    return `<div class="history-item" onclick="loadHistory(${i})">
      <div class="history-snippet">${esc(snippet)}</div>
      <div class="history-meta">${esc(item.lang)} · ${ago}</div>
    </div>`;
  }).join('');
}
function loadHistory(i) {
  const h = getHistory();
  const item = h[i];
  if (!item) return;
  document.getElementById('errorMsg').value = item.errorMsg;
  document.getElementById('lang').value = item.lang;
  renderResults(item.parsed, item.errorMsg, item.lang);
}
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

// Init
renderHistory();
</script>
</body>
</html>
