<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homework Problem Solver</title>
  <style>
    :root {
      --bg: #eef6ec;
      --accent: #b8d4b0;
      --accent-dark: #3a7030;
      --accent-mid: #5a9a4a;
      --card-bg: #ffffff;
      --border: #c8e0c0;
      --text: #1a2e18;
      --text-muted: #5a7054;
      --highlight: #d4edcc;
      --shadow: 0 2px 12px rgba(58,112,48,0.10);
      --radius: 14px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }
    header {
      background: linear-gradient(135deg, #3a7030 0%, #5a9a4a 100%);
      color: white;
      padding: 28px 24px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.5px; }
    header p { opacity: 0.88; margin-top: 6px; font-size: 1rem; }
    .container { max-width: 820px; margin: 0 auto; padding: 0 16px; }

    /* API Key */
    .api-bar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }
    .api-bar .container { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .api-bar label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
    .api-bar input {
      flex: 1; min-width: 180px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      font-size: 0.87rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .api-bar input:focus { border-color: var(--accent-mid); }
    .api-bar .save-btn {
      background: var(--accent-dark);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }
    .api-bar .save-btn:hover { background: var(--accent-mid); }
    .api-status { font-size: 0.78rem; color: var(--accent-mid); font-weight: 600; }

    /* Main card */
    .main-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-top: 24px;
      border: 1.5px solid var(--border);
    }
    .form-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
    .form-group label { font-size: 0.82rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    select, textarea {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 0.95rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    select:focus, textarea:focus { border-color: var(--accent-mid); }
    textarea { width: 100%; min-height: 110px; resize: vertical; line-height: 1.6; }

    /* Mode toggle */
    .mode-label { font-size: 0.82rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .mode-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .mode-pill {
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent-dark);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .mode-pill.active {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
      color: white;
    }
    .mode-pill:hover:not(.active) { background: var(--highlight); }

    /* Solve button */
    .solve-btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #3a7030, #5a9a4a);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .solve-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .solve-btn:active { transform: translateY(0); }
    .solve-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* Results */
    .results { margin-top: 28px; }
    .results-header {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .subject-badge {
      background: var(--accent-dark);
      color: white;
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .difficulty-badge {
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .difficulty-Easy { background: #d4edcc; color: #2a6020; }
    .difficulty-Medium { background: #fff3cd; color: #856404; }
    .difficulty-Hard { background: #fde8e8; color: #9a2a2a; }

    /* Step cards */
    .steps-list { display: flex; flex-direction: column; gap: 14px; }
    .step-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
    }
    .step-num {
      position: absolute;
      top: -14px; left: 18px;
      background: var(--accent-dark);
      color: white;
      border-radius: 999px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 800;
    }
    .step-title { font-size: 1rem; font-weight: 700; margin-bottom: 10px; padding-top: 4px; color: var(--accent-dark); }
    .step-explanation { font-size: 0.95rem; line-height: 1.65; color: var(--text); margin-bottom: 10px; }
    .step-formula {
      background: #f0f9ee;
      border-left: 4px solid var(--accent-mid);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 10px 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.93rem;
      color: #2a5020;
      margin-bottom: 8px;
    }
    .step-example {
      background: #fffde7;
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-size: 0.88rem;
      color: #5a4a00;
      border: 1px solid #f0e080;
    }
    .step-example strong { display: block; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; color: #8a7000; }

    /* Final answer */
    .final-answer {
      background: linear-gradient(135deg, #d4edcc, #e8f5e4);
      border: 2px solid var(--accent-mid);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 18px;
    }
    .final-answer h3 { color: var(--accent-dark); font-size: 1rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.82rem; }
    .final-answer p { font-size: 1.1rem; font-weight: 700; color: #1a3a16; line-height: 1.5; }

    /* Why it works */
    .why-section { margin-top: 14px; }
    .why-toggle {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent-dark);
      cursor: pointer;
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s;
    }
    .why-toggle:hover { background: var(--highlight); }
    .why-content {
      background: #f8fcf6;
      border: 1.5px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      padding: 16px;
      font-size: 0.93rem;
      line-height: 1.7;
      color: var(--text);
      display: none;
    }
    .why-content.open { display: block; }

    /* Answer card (just the answer mode) */
    .answer-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
    }
    .answer-card .answer-val {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent-dark);
      margin-bottom: 12px;
    }
    .answer-card .answer-exp { font-size: 0.95rem; line-height: 1.65; color: var(--text); }

    /* Hint card */
    .hint-card {
      background: #fffde7;
      border: 2px solid #f0d840;
      border-radius: var(--radius);
      padding: 22px;
    }
    .hint-card h3 { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.5px; color: #8a7000; margin-bottom: 10px; }
    .hint-card p { font-size: 1rem; line-height: 1.65; color: #3a3000; }
    .another-hint-btn {
      background: #f0d840;
      color: #3a3000;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 14px;
      transition: opacity 0.2s;
    }
    .another-hint-btn:hover { opacity: 0.8; }

    /* Practice + follow-up */
    .action-row {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-top: 18px;
    }
    .action-btn {
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent-dark);
      border-radius: var(--radius-sm);
      padding: 9px 16px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .action-btn:hover { background: var(--highlight); }
    .followup-section { margin-top: 22px; border-top: 1.5px solid var(--border); padding-top: 20px; }
    .followup-section h4 { font-size: 0.88rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .followup-input-row { display: flex; gap: 10px; }
    .followup-input-row input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 0.93rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      font-family: inherit;
    }
    .followup-input-row input:focus { border-color: var(--accent-mid); }
    .followup-input-row button {
      background: var(--accent-dark);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
    }
    .followup-input-row button:hover { background: var(--accent-mid); }
    .followup-answer {
      margin-top: 12px;
      background: #f8fcf6;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      font-size: 0.93rem;
      line-height: 1.65;
      color: var(--text);
      display: none;
    }

    /* History */
    .history-section {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      margin-top: 24px;
      border: 1.5px solid var(--border);
    }
    .history-section h3 { font-size: 0.88rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 14px; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s;
      gap: 10px;
    }
    .history-item:hover { background: var(--highlight); }
    .history-item-text { font-size: 0.88rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .history-item-meta { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }

    /* Loading */
    .loading {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 40px;
      color: var(--text-muted); font-size: 0.95rem;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 3px solid var(--accent);
      border-top-color: var(--accent-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Practice problem */
    .practice-card {
      background: #f0f9ee;
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 18px;
    }
    .practice-card h3 { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent-dark); margin-bottom: 10px; font-weight: 700; }
    .practice-card p { font-size: 1rem; line-height: 1.65; color: var(--text); }
    .use-practice-btn {
      background: var(--accent-dark);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    .use-practice-btn:hover { background: var(--accent-mid); }

    /* Error */
    .error-msg {
      background: #fde8e8;
      border: 1.5px solid #f5a0a0;
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 0.93rem;
      color: #7a1a1a;
      margin-top: 14px;
    }

    @media (max-width: 600px) {
      .main-card { padding: 18px; }
      header h1 { font-size: 1.5rem; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <h1>📚 Homework Problem Solver</h1>
    <p>Step-by-step help that teaches you <em>how</em> to think — not just the answer.</p>
  </div>
</header>

<div class="api-bar">
  <div class="container">
    <label>Gemini API Key:</label>
    <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
    <button class="save-btn" onclick="saveApiKey()">Save</button>
    <span class="api-status" id="apiStatus"></span>
  </div>
</div>

<div class="container">
  <div class="main-card">
    <div style="margin-bottom:16px;">
      <label style="font-size:0.82rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px;">Your Problem</label>
      <textarea id="problemInput" placeholder="Type or paste your homework problem here…"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Subject</label>
        <select id="subject">
          <option>Math</option>
          <option>Physics</option>
          <option>Chemistry</option>
          <option>Biology</option>
          <option>History</option>
          <option>English / Writing</option>
          <option>Computer Science</option>
          <option>Economics</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Grade Level</label>
        <select id="gradeLevel">
          <option>Middle School</option>
          <option>High School</option>
          <option>College / University</option>
        </select>
      </div>
    </div>

    <div class="mode-label">Mode</div>
    <div class="mode-pills">
      <button class="mode-pill active" data-mode="teach" onclick="setMode(this)">🎓 Teach me</button>
      <button class="mode-pill" data-mode="answer" onclick="setMode(this)">⚡ Just the answer</button>
      <button class="mode-pill" data-mode="hint" onclick="setMode(this)">💡 Hint only</button>
    </div>

    <button class="solve-btn" id="solveBtn" onclick="solveProblem()">🔍 Solve It</button>

    <div id="resultsArea"></div>
  </div>

  <div class="history-section" id="historySection" style="display:none;">
    <h3>📋 Recent Problems</h3>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script>
  let currentMode = 'teach';
  let currentProblem = '';
  let currentSubject = '';
  let currentGrade = '';
  let followUpHint = '';

  // Init API key
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('gemini_api_key');
    if (saved) {
      document.getElementById('apiKey').value = saved;
      document.getElementById('apiStatus').textContent = '✓ Key loaded';
    }
    renderHistory();
  });

  function saveApiKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) return;
    localStorage.setItem('gemini_api_key', key);
    document.getElementById('apiStatus').textContent = '✓ Saved!';
    setTimeout(() => document.getElementById('apiStatus').textContent = '', 2000);
  }

  function setMode(el) {
    document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    currentMode = el.dataset.mode;
  }

  async function callGemini(prompt) {
    const key = localStorage.getItem('gemini_api_key') || document.getElementById('apiKey').value.trim();
    if (!key) throw new Error('Please enter your Gemini API key at the top of the page.');
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API error ${res.status}`);
    }
    const data = await res.json();
    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    // strip markdown code fences if present
    text = text.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
    return JSON.parse(text);
  }

  function buildPrompt(problem, subject, grade, mode) {
    if (mode === 'teach') {
      return `You are a patient tutor helping a ${grade} ${subject} student. Solve this problem step by step, teaching the student HOW to think through it. Do not just give the answer — guide them.

Problem: ${problem}

Respond in this exact JSON:
{
  "subject": "${subject}",
  "difficulty": "Medium",
  "steps": [
    {
      "title": "Step 1: Identify what we know",
      "explanation": "Plain English explanation",
      "formula": "Optional formula or key concept (empty string if none)",
      "example": "Optional mini example (empty string if none)"
    }
  ],
  "finalAnswer": "The complete final answer",
  "whyItWorks": "Deeper explanation of the underlying concept"
}
Return only JSON, no markdown.`;
    }
    if (mode === 'answer') {
      return `Solve this ${subject} problem for a ${grade} student and give a brief explanation.
Problem: ${problem}
Return JSON: { "answer": "final answer", "explanation": "2-3 sentence explanation" }
Return only JSON, no markdown.`;
    }
    if (mode === 'hint') {
      return `Give ONE helpful hint for this ${subject} problem without solving it. Just enough to get unstuck.
Problem: ${problem}
Return JSON: { "hint": "one hint", "followUpHint": "a second hint if they're still stuck" }
Return only JSON, no markdown.`;
    }
  }

  async function solveProblem() {
    const problem = document.getElementById('problemInput').value.trim();
    const subject = document.getElementById('subject').value;
    const grade = document.getElementById('gradeLevel').value;

    if (!problem) {
      alert('Please enter a homework problem!');
      return;
    }

    currentProblem = problem;
    currentSubject = subject;
    currentGrade = grade;

    const btn = document.getElementById('solveBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Solving…';

    const area = document.getElementById('resultsArea');
    area.innerHTML = `<div class="loading"><div class="spinner"></div>Thinking through your problem…</div>`;

    try {
      const prompt = buildPrompt(problem, subject, grade, currentMode);
      const data = await callGemini(prompt);
      renderResult(data, currentMode, subject, area);
      saveToHistory(problem, subject, currentMode);
    } catch (e) {
      area.innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
    }

    btn.disabled = false;
    btn.textContent = '🔍 Solve It';
  }

  function renderResult(data, mode, subject, area) {
    followUpHint = '';

    if (mode === 'teach') {
      const steps = (data.steps || []).map((s, i) => `
        <div class="step-card">
          <div class="step-num">${i + 1}</div>
          <div class="step-title">${escHtml(s.title)}</div>
          <div class="step-explanation">${escHtml(s.explanation)}</div>
          ${s.formula ? `<div class="step-formula">${escHtml(s.formula)}</div>` : ''}
          ${s.example ? `<div class="step-example"><strong>Example</strong>${escHtml(s.example)}</div>` : ''}
        </div>`).join('');

      area.innerHTML = `
        <div class="results">
          <div class="results-header">
            <span class="subject-badge">${escHtml(subject)}</span>
            <span class="difficulty-badge difficulty-${escHtml(data.difficulty || 'Medium')}">${escHtml(data.difficulty || 'Medium')}</span>
          </div>
          <div class="steps-list">${steps}</div>
          <div class="final-answer">
            <h3>✅ Final Answer</h3>
            <p>${escHtml(data.finalAnswer || '')}</p>
          </div>
          <div class="why-section">
            <button class="why-toggle" onclick="toggleWhy(this)">
              <span>💡 Why does this work?</span><span id="whyArrow">▼</span>
            </button>
            <div class="why-content" id="whyContent">${escHtml(data.whyItWorks || '')}</div>
          </div>
          ${actionRow()}
          ${followUpSection()}
        </div>`;

    } else if (mode === 'answer') {
      area.innerHTML = `
        <div class="results">
          <div class="results-header">
            <span class="subject-badge">${escHtml(subject)}</span>
          </div>
          <div class="answer-card">
            <div class="answer-val">Answer: ${escHtml(data.answer || '')}</div>
            <div class="answer-exp">${escHtml(data.explanation || '')}</div>
          </div>
          ${actionRow()}
          ${followUpSection()}
        </div>`;

    } else if (mode === 'hint') {
      followUpHint = data.followUpHint || '';
      area.innerHTML = `
        <div class="results">
          <div class="hint-card" id="hintCard">
            <h3>💡 Your Hint</h3>
            <p id="hintText">${escHtml(data.hint || '')}</p>
            ${followUpHint ? `<button class="another-hint-btn" onclick="showNextHint()">Another hint?</button>` : ''}
          </div>
          ${actionRow()}
        </div>`;
    }
  }

  function actionRow() {
    return `<div class="action-row">
      <button class="action-btn" onclick="generatePractice()">🔄 Try a similar problem</button>
    </div>
    <div id="practiceArea"></div>`;
  }

  function followUpSection() {
    return `<div class="followup-section">
      <h4>Ask a follow-up question</h4>
      <div class="followup-input-row">
        <input id="followupInput" type="text" placeholder="e.g. Why do we square the distance?" onkeydown="if(event.key==='Enter')askFollowUp()" />
        <button onclick="askFollowUp()">Ask</button>
      </div>
      <div class="followup-answer" id="followupAnswer"></div>
    </div>`;
  }

  function toggleWhy(btn) {
    const content = document.getElementById('whyContent');
    const arrow = document.getElementById('whyArrow');
    const open = content.classList.toggle('open');
    arrow.textContent = open ? '▲' : '▼';
  }

  function showNextHint() {
    document.getElementById('hintText').textContent = followUpHint;
    document.querySelector('.another-hint-btn').style.display = 'none';
  }

  async function askFollowUp() {
    const q = document.getElementById('followupInput').value.trim();
    if (!q) return;
    const ansDiv = document.getElementById('followupAnswer');
    ansDiv.style.display = 'block';
    ansDiv.textContent = 'Thinking…';
    try {
      const prompt = `A ${currentGrade} student is studying this ${currentSubject} problem: "${currentProblem}". They ask: "${q}". Give a clear, concise answer in 2-4 sentences at their level. Return plain text, no JSON.`;
      const key = localStorage.getItem('gemini_api_key') || document.getElementById('apiKey').value.trim();
      if (!key) throw new Error('No API key.');
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      const data = await res.json();
      ansDiv.textContent = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';
    } catch (e) {
      ansDiv.textContent = '❌ ' + e.message;
    }
  }

  async function generatePractice() {
    const practiceArea = document.getElementById('practiceArea');
    practiceArea.innerHTML = `<div class="loading"><div class="spinner"></div>Generating a practice problem…</div>`;
    try {
      const prompt = `Create ONE original practice problem similar in type and difficulty to this ${currentSubject} problem for a ${currentGrade} student: "${currentProblem}". Return JSON: { "problem": "the new problem text" }. Return only JSON, no markdown.`;
      const data = await callGemini(prompt);
      practiceArea.innerHTML = `
        <div class="practice-card">
          <h3>🔄 Practice Problem</h3>
          <p id="practiceText">${escHtml(data.problem || '')}</p>
          <button class="use-practice-btn" onclick="usePractice()">Use this problem</button>
        </div>`;
    } catch (e) {
      practiceArea.innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
    }
  }

  function usePractice() {
    const text = document.getElementById('practiceText').textContent;
    document.getElementById('problemInput').value = text;
    document.getElementById('resultsArea').innerHTML = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // History
  function saveToHistory(problem, subject, mode) {
    let hist = JSON.parse(localStorage.getItem('hw_history') || '[]');
    hist.unshift({ problem, subject, mode, date: new Date().toLocaleDateString() });
    hist = hist.slice(0, 8);
    localStorage.setItem('hw_history', JSON.stringify(hist));
    renderHistory();
  }

  function renderHistory() {
    const hist = JSON.parse(localStorage.getItem('hw_history') || '[]');
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (!hist.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = hist.map((h, i) => `
      <div class="history-item" onclick="loadHistory(${i})">
        <span class="history-item-text">${escHtml(h.problem.slice(0, 80))}${h.problem.length > 80 ? '…' : ''}</span>
        <span class="history-item-meta">${escHtml(h.subject)} · ${escHtml(h.date)}</span>
      </div>`).join('');
  }

  function loadHistory(i) {
    const hist = JSON.parse(localStorage.getItem('hw_history') || '[]');
    const h = hist[i];
    if (!h) return;
    document.getElementById('problemInput').value = h.problem;
    document.getElementById('subject').value = h.subject;
    document.querySelectorAll('.mode-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.mode === h.mode);
    });
    currentMode = h.mode;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
